
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Ledger — To-Do Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1ea;
    --paper: #faf8f3;
    --ink: #1a1814;
    --ink-soft: #4a463e;
    --line: #1a1814;
    --accent: #c8412c;
    --accent-soft: #e8b8a8;
    --done: #6b8e4e;
    --shadow: rgba(26, 24, 20, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    min-height: 100vh;
    padding: 30px 20px 60px;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(26,24,20,0.06) 1px, transparent 0);
    background-size: 24px 24px;
  }

  .container {
    max-width: 920px;
    margin: 0 auto;
  }

  /* ================= MASTHEAD ================= */
  .masthead {
    border-top: 3px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    padding: 16px 0 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 8px;
  }
  .masthead-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-soft);
  }
  .edition {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
  }

  .title-block {
    text-align: center;
    padding: 40px 0 30px;
    border-bottom: 4px double var(--ink);
    margin-bottom: 30px;
    position: relative;
  }
  .title-block::before,
  .title-block::after {
    content: "❦";
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    color: var(--accent);
  }
  .title-block::before { left: 20px; }
  .title-block::after { right: 20px; }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: clamp(48px, 9vw, 92px);
    letter-spacing: -0.04em;
    line-height: 0.92;
    font-variation-settings: "opsz" 144;
  }
  h1 em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }
  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    margin-top: 14px;
    color: var(--ink-soft);
  }

  /* ================= STATS GRID ================= */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border: 1px solid var(--ink);
    margin-bottom: 28px;
    background: var(--paper);
  }
  .stat {
    padding: 18px 16px;
    border-right: 1px solid var(--ink);
    text-align: center;
    position: relative;
  }
  .stat:last-child { border-right: none; }
  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: 'Fraunces', serif;
    font-size: 36px;
    font-weight: 600;
    line-height: 1;
    font-variation-settings: "opsz" 144;
  }
  .stat-value.accent { color: var(--accent); }
  .stat-value.done { color: var(--done); }

  /* ================= INPUT ================= */
  .input-section {
    background: var(--paper);
    border: 1px solid var(--ink);
    padding: 20px;
    margin-bottom: 28px;
    box-shadow: 6px 6px 0 var(--ink);
  }
  .input-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .input-field {
    flex: 1;
    min-width: 200px;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--ink);
    padding: 8px 4px;
    font-family: 'Fraunces', serif;
    font-size: 18px;
    color: var(--ink);
    outline: none;
  }
  .input-field::placeholder {
    color: var(--ink-soft);
    font-style: italic;
  }
  .input-field:focus {
    border-bottom-color: var(--accent);
  }
  .priority-select, .category-select {
    background: transparent;
    border: 1px solid var(--ink);
    padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    color: var(--ink);
  }
  .add-btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 10px 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .add-btn:hover {
    background: var(--accent);
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0 var(--ink);
  }

  /* ================= FILTERS ================= */
  .filters {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    border-bottom: 2px solid var(--ink);
    flex-wrap: wrap;
  }
  .filter-btn {
    background: transparent;
    border: none;
    padding: 12px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    cursor: pointer;
    color: var(--ink-soft);
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
  }
  .filter-btn:hover { color: var(--ink); }
  .filter-btn.active {
    color: var(--ink);
    border-bottom-color: var(--accent);
    font-weight: 700;
  }
  .filter-btn .count {
    display: inline-block;
    background: var(--ink);
    color: var(--paper);
    padding: 1px 6px;
    border-radius: 2px;
    margin-left: 6px;
    font-size: 9px;
  }

  /* ================= TASK LIST ================= */
  .task-list {
    list-style: none;
  }
  .task-item {
    background: var(--paper);
    border: 1px solid var(--ink);
    padding: 18px 20px;
    margin-bottom: 12px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    transition: all 0.25s;
    position: relative;
    animation: slideIn 0.3s ease-out;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .task-item:hover {
    transform: translateX(4px);
    box-shadow: -4px 4px 0 var(--ink);
  }
  .task-item.completed {
    background: rgba(107, 142, 78, 0.08);
    border-color: var(--done);
  }
  .task-item.completed .task-text {
    text-decoration: line-through;
    color: var(--ink-soft);
    font-style: italic;
  }
  .task-item.priority-high::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: var(--accent);
  }

  .checkbox {
    appearance: none;
    width: 22px;
    height: 22px;
    border: 2px solid var(--ink);
    background: var(--paper);
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    margin-top: 2px;
    transition: all 0.2s;
  }
  .checkbox:checked {
    background: var(--done);
    border-color: var(--done);
  }
  .checkbox:checked::after {
    content: "✓";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--paper);
    font-size: 16px;
    font-weight: bold;
  }

  .task-content {
    flex: 1;
    min-width: 0;
  }
  .task-text {
    font-family: 'Fraunces', serif;
    font-size: 19px;
    font-weight: 400;
    line-height: 1.35;
    margin-bottom: 6px;
    word-wrap: break-word;
  }
  .task-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
  }
  .task-tag {
    padding: 2px 8px;
    border: 1px solid var(--ink-soft);
    border-radius: 2px;
  }
  .task-tag.priority-high {
    background: var(--accent);
    color: var(--paper);
    border-color: var(--accent);
  }
  .task-tag.priority-medium {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .task-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .icon-btn {
    background: transparent;
    border: 1px solid var(--ink);
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--ink);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:hover {
    background: var(--ink);
    color: var(--paper);
  }
  .icon-btn.delete:hover {
    background: var(--accent);
    border-color: var(--accent);
  }

  /* ================= EMPTY STATE ================= */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    border: 2px dashed var(--ink-soft);
    background: var(--paper);
  }
  .empty-state-mark {
    font-family: 'Fraunces', serif;
    font-size: 80px;
    font-style: italic;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 16px;
    font-variation-settings: "opsz" 144;
  }
  .empty-state h3 {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .empty-state p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-soft);
  }

  /* ================= FOOTER ================= */
  .footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 3px solid var(--ink);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .footer-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-soft);
  }
  .footer-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .clear-btn {
    background: transparent;
    border: 1px solid var(--ink-soft);
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    cursor: pointer;
    color: var(--ink-soft);
    transition: all 0.2s;
  }
  .clear-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .clear-btn.export:hover {
    border-color: var(--done);
    color: var(--done);
  }

  /* ================= PROGRESS BAR ================= */
  .progress-section {
    margin-bottom: 24px;
    background: var(--paper);
    border: 1px solid var(--ink);
    padding: 16px 20px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .progress-label-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-soft);
  }
  .progress-percent {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 600;
    font-variation-settings: "opsz" 144;
  }
  .progress-bar {
    height: 8px;
    background: var(--bg);
    border: 1px solid var(--ink);
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: repeating-linear-gradient(
      45deg,
      var(--done),
      var(--done) 8px,
      #5a7a40 8px,
      #5a7a40 16px
    );
    transition: width 0.5s cubic-bezier(0.65, 0, 0.35, 1);
  }

  /* ================= TOAST ================= */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink);
    color: var(--paper);
    padding: 12px 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    border: 2px solid var(--ink);
    box-shadow: 4px 4px 0 var(--accent);
    transition: transform 0.3s cubic-bezier(0.65, 0, 0.35, 1);
    z-index: 1000;
    pointer-events: none;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .stat:nth-child(2) { border-right: none; }
    .stat:nth-child(1), .stat:nth-child(2) { border-bottom: 1px solid var(--ink); }
    .title-block::before, .title-block::after { display: none; }
    .input-row { flex-direction: column; }
    .input-field { width: 100%; }
    .footer { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Masthead -->
  <div class="masthead">
    <div class="masthead-meta" id="todayDate">—</div>
    <div class="edition">№ 01 / Daily Edition</div>
    <div class="masthead-meta">Streak: <span id="dayCount">1</span> hari</div>
  </div>

  <!-- Title -->
  <div class="title-block">
    <h1>The Daily <em>Ledger</em></h1>
    <div class="subtitle">A Periodical Accounting of Tasks &amp; Intentions</div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total</div>
      <div class="stat-value" id="totalCount">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Aktif</div>
      <div class="stat-value accent" id="activeCount">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Selesai</div>
      <div class="stat-value done" id="completedCount">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Prioritas</div>
      <div class="stat-value accent" id="priorityCount">0</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-label">
      <span class="progress-label-text">Pencapaian Hari Ini</span>
      <span class="progress-percent" id="progressPercent">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-section">
    <div class="input-row">
      <input
        type="text"
        id="taskInput"
        class="input-field"
        placeholder="Tulis tugas baru di sini…"
        maxlength="200"
      />
      <select id="prioritySelect" class="priority-select">
        <option value="low">Rendah</option>
        <option value="medium" selected>Sedang</option>
        <option value="high">Tinggi</option>
      </select>
      <select id="categorySelect" class="category-select">
        <option value="kerja">Kerja</option>
        <option value="pribadi">Pribadi</option>
        <option value="belajar">Belajar</option>
        <option value="kesehatan">Kesehatan</option>
        <option value="lainnya" selected>Lainnya</option>
      </select>
      <button class="add-btn" id="addBtn">＋ Tambah</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all">Semua <span class="count" id="countAll">0</span></button>
    <button class="filter-btn" data-filter="active">Aktif <span class="count" id="countActive">0</span></button>
    <button class="filter-btn" data-filter="completed">Selesai <span class="count" id="countCompleted">0</span></button>
    <button class="filter-btn" data-filter="high">Prioritas <span class="count" id="countHigh">0</span></button>
  </div>

  <!-- Task List -->
  <ul class="task-list" id="taskList"></ul>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState" style="display: none;">
    <div class="empty-state-mark">∅</div>
    <h3>Buku catatan masih kosong</h3>
    <p>Tambahkan tugas pertama untuk memulai hari</p>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-text">Tersimpan otomatis di browser</div>
    <div class="footer-actions">
      <button class="clear-btn export" id="exportBtn">↓ Ekspor JSON</button>
      <button class="clear-btn" id="clearCompletedBtn">Hapus Selesai</button>
      <button class="clear-btn" id="clearAllBtn">Hapus Semua</button>
    </div>
  </div>

</div>

<!-- Toast notification -->
<div class="toast" id="toast">Tersimpan</div>

<script>
  // ===== STORAGE KEY =====
  const STORAGE_KEY = 'dailyLedgerTasks_v1';
  const STREAK_KEY = 'dailyLedgerStreak_v1';

  // ===== STATE =====
  let tasks = loadTasks();
  let currentFilter = 'all';

  // ===== STORAGE FUNCTIONS =====
  function loadTasks() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    } catch (e) {
      console.error('Gagal memuat data:', e);
      return [];
    }
  }

  function saveTasks() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    } catch (e) {
      console.error('Gagal menyimpan:', e);
      showToast('⚠️ Gagal menyimpan');
    }
  }

  function updateStreak() {
    try {
      const today = new Date().toDateString();
      const data = JSON.parse(localStorage.getItem(STREAK_KEY) || '{"lastDate":null,"count":0}');

      if (data.lastDate === today) {
        document.getElementById('dayCount').textContent = data.count;
        return;
      }

      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);

      if (data.lastDate === yesterday.toDateString()) {
        data.count += 1;
      } else if (data.lastDate !== null) {
        data.count = 1;
      } else {
        data.count = 1;
      }

      data.lastDate = today;
      localStorage.setItem(STREAK_KEY, JSON.stringify(data));
      document.getElementById('dayCount').textContent = data.count;
    } catch (e) {
      document.getElementById('dayCount').textContent = '1';
    }
  }

  // ===== INIT =====
  function init() {
    updateDate();
    updateStreak();
    render();
    setupEventListeners();
  }

  function updateDate() {
    const now = new Date();
    const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
    const months = ['Januari','Februari','Maret','April','Mei','Juni',
                    'Juli','Agustus','September','Oktober','November','Desember'];
    const dateStr = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
    document.getElementById('todayDate').textContent = dateStr;
  }

  // ===== TOAST =====
  let toastTimeout;
  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => {
      toast.classList.remove('show');
    }, 1800);
  }

  // ===== EVENT LISTENERS =====
  function setupEventListeners() {
    document.getElementById('addBtn').addEventListener('click', addTask);
    document.getElementById('taskInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addTask();
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    document.getElementById('clearCompletedBtn').addEventListener('click', clearCompleted);
    document.getElementById('clearAllBtn').addEventListener('click', clearAll);
    document.getElementById('exportBtn').addEventListener('click', exportData);
  }

  // ===== TASK FUNCTIONS =====
  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) {
      input.focus();
      return;
    }

    const task = {
      id: Date.now() + Math.random(),
      text: text,
      completed: false,
      priority: document.getElementById('prioritySelect').value,
      category: document.getElementById('categorySelect').value,
      createdAt: new Date().toISOString()
    };

    tasks.unshift(task);
    saveTasks();
    input.value = '';
    input.focus();
    render();
    showToast('✓ Tugas ditambahkan');
  }

  function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (task) {
      task.completed = !task.completed;
      task.completedAt = task.completed ? new Date().toISOString() : null;
      saveTasks();
      render();
      if (task.completed) showToast('✓ Selesai!');
    }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    render();
    showToast('✗ Tugas dihapus');
  }

  function editTask(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    const newText = prompt('Edit tugas:', task.text);
    if (newText !== null && newText.trim()) {
      task.text = newText.trim();
      saveTasks();
      render();
      showToast('✎ Tugas diperbarui');
    }
  }

  function clearCompleted() {
    const completedCount = tasks.filter(t => t.completed).length;
    if (completedCount === 0) {
      showToast('Tidak ada tugas selesai');
      return;
    }
    if (confirm(`Hapus ${completedCount} tugas yang sudah selesai?`)) {
      tasks = tasks.filter(t => !t.completed);
      saveTasks();
      render();
      showToast(`✗ ${completedCount} tugas dihapus`);
    }
  }

  function clearAll() {
    if (tasks.length === 0) {
      showToast('Sudah kosong');
      return;
    }
    if (confirm(`Hapus SEMUA ${tasks.length} tugas? Tindakan ini tidak dapat dibatalkan.`)) {
      tasks = [];
      saveTasks();
      render();
      showToast('✗ Semua dihapus');
    }
  }

  function exportData() {
    if (tasks.length === 0) {
      showToast('Tidak ada data');
      return;
    }
    const dataStr = JSON.stringify(tasks, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const date = new Date().toISOString().split('T')[0];
    a.href = url;
    a.download = `daily-ledger-${date}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('↓ Data diekspor');
  }

  // ===== RENDER =====
  function render() {
    const list = document.getElementById('taskList');
    const emptyState = document.getElementById('emptyState');

    let filtered = tasks;
    if (currentFilter === 'active') filtered = tasks.filter(t => !t.completed);
    else if (currentFilter === 'completed') filtered = tasks.filter(t => t.completed);
    else if (currentFilter === 'high') filtered = tasks.filter(t => t.priority === 'high' && !t.completed);

    filtered.sort((a, b) => {
      if (a.completed !== b.completed) return a.completed ? 1 : -1;
      const priorityOrder = { high: 0, medium: 1, low: 2 };
      if (priorityOrder[a.priority] !== priorityOrder[b.priority]) {
        return priorityOrder[a.priority] - priorityOrder[b.priority];
      }
      return new Date(b.createdAt) - new Date(a.createdAt);
    });

    if (filtered.length === 0) {
      list.innerHTML = '';
      emptyState.style.display = 'block';
    } else {
      emptyState.style.display = 'none';
      list.innerHTML = filtered.map(task => renderTask(task)).join('');

      list.querySelectorAll('.checkbox').forEach(cb => {
        cb.addEventListener('change', () => toggleTask(parseFloat(cb.dataset.id)));
      });
      list.querySelectorAll('.icon-btn.edit').forEach(btn => {
        btn.addEventListener('click', () => editTask(parseFloat(btn.dataset.id)));
      });
      list.querySelectorAll('.icon-btn.delete').forEach(btn => {
        btn.addEventListener('click', () => {
          if (confirm('Hapus tugas ini?')) deleteTask(parseFloat(btn.dataset.id));
        });
      });
    }

    updateStats();
  }

  function renderTask(task) {
    const priorityLabels = { high: 'Tinggi', medium: 'Sedang', low: 'Rendah' };
    const categoryLabels = {
      kerja: 'Kerja', pribadi: 'Pribadi', belajar: 'Belajar',
      kesehatan: 'Kesehatan', lainnya: 'Umum'
    };
    const time = new Date(task.createdAt).toLocaleTimeString('id-ID', {
      hour: '2-digit', minute: '2-digit'
    });

    return `
      <li class="task-item ${task.completed ? 'completed' : ''} priority-${task.priority}">
        <input type="checkbox" class="checkbox" data-id="${task.id}" ${task.completed ? 'checked' : ''}>
        <div class="task-content">
          <div class="task-text">${escapeHtml(task.text)}</div>
          <div class="task-meta">
            <span class="task-tag priority-${task.priority}">${priorityLabels[task.priority]}</span>
            <span class="task-tag">${categoryLabels[task.category]}</span>
            <span>${time}</span>
          </div>
        </div>
        <div class="task-actions">
          <button class="icon-btn edit" data-id="${task.id}" title="Edit">✎</button>
          <button class="icon-btn delete" data-id="${task.id}" title="Hapus">×</button>
        </div>
      </li>
    `;
  }

  function updateStats() {
    const total = tasks.length;
    const completed = tasks.filter(t => t.completed).length;
    const active = total - completed;
    const high = tasks.filter(t => t.priority === 'high' && !t.completed).length;
    const percent = total > 0 ? Math.round((completed / total) * 100) : 0;

    document.getElementById('totalCount').textContent = total;
    document.getElementById('activeCount').textContent = active;
    document.getElementById('completedCount').textContent = completed;
    document.getElementById('priorityCount').textContent = high;

    document.getElementById('countAll').textContent = total;
    document.getElementById('countActive').textContent = active;
    document.getElementById('countCompleted').textContent = completed;
    document.getElementById('countHigh').textContent = high;

    document.getElementById('progressPercent').textContent = percent + '%';
    document.getElementById('progressFill').style.width = percent + '%';
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // ===== START =====
  init();
</script>
</body>
</html>
